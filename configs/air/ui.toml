# Air 配置文件 - 前端 UI 热重载
# 监听 Vue/TS/CSS 等前端文件变化，自动重启 Vite dev server

root = "/app"
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  args_bin = []
  bin = ""
  cmd = "echo '前端文件变更，重启 Vite...'"
  delay = 500
  exclude_dir = ["tmp", "node_modules", "dist", ".git", ".vite"]
  exclude_file = []
  exclude_regex = [".*\\.map$"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = "npm run dev -- --host 0.0.0.0"
  include_dir = ["src"]
  include_ext = ["vue", "ts", "tsx", "js", "jsx", "css", "scss", "less", "json"]
  include_file = ["vite.config.ts", "tsconfig.json", "index.html"]
  kill_delay = "500ms"
  log = "build-errors.log"
  poll = true
  poll_interval = 500
  rerun = false
  rerun_delay = 500
  send_interrupt = true
  stop_on_error = false

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  time = false

[misc]
  clean_on_exit = false

[screen]
  clear_on_rebuild = false
  keep_scroll = true
