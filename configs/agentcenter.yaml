# mxcwpp AgentCenter 配置 (P1-5)

grpc_addr: ":6751"
http_addr: ":6752"
max_agents: 50000
manager_endpoint: "http://localhost:8080"
internal_secret: ""

# mTLS (PR4 推荐启用)
tls_cert_file: "/var/lib/mxcwpp-ac/certs/server.crt"
tls_key_file: "/var/lib/mxcwpp-ac/certs/server.key"
ca_file: "/var/lib/mxcwpp-ac/certs/ca.crt"

database:
  dsn: ""
  max_open_conns: 50
  max_idle_conns: 10
  conn_max_lifetime: "1h"

redis:
  addr: "localhost:6379"

kafka:
  brokers: []

otel:
  enabled: false
  endpoint: "localhost:4318"
  sample_rate: 0.1
