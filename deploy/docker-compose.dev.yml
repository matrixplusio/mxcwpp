name: mxcwpp-dev

# 开发环境 compose 文件（独立，Air 热重载）
# 启动：docker compose -f docker-compose.dev.yml up

services:
  # ==================== 基础设施 ====================
  mysql:
    image: mysql:8.4
    container_name: mxcwpp-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-mxcwpp}
      MYSQL_USER: ${MYSQL_USER:-mxcwpp_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${MYSQL_HOST_PORT:-13306}:3306"
    volumes:
      - ${DATA_DIR:-./data}/mysql:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./config/mysql.cnf:/etc/mysql/conf.d/custom.cnf:ro
      - ${DATA_DIR:-./data}/logs/mysql:/var/log/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - mxcwpp-net

  redis:
    image: redis:7-alpine
    container_name: mxcwpp-redis
    restart: always
    command: >
      sh -c '
        if [ -n "$REDIS_PASSWORD" ]; then
          redis-server --appendonly yes --requirepass "$REDIS_PASSWORD"
        else
          redis-server --appendonly yes
        fi
      '
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    ports:
      - "16379:6379"
    volumes:
      - ${DATA_DIR:-./data}/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - mxcwpp-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: mxcwpp-kafka
    restart: always
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 4
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 72
      KAFKA_MESSAGE_MAX_BYTES: 10485760
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ${DATA_DIR:-./data}/kafka-dev:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - mxcwpp-net

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    container_name: mxcwpp-clickhouse
    restart: always
    cap_add:
      - SYS_NICE
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DATABASE:-mxcwpp}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ${DATA_DIR:-./data}/clickhouse:/var/lib/clickhouse
      - ./init-clickhouse.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./config/clickhouse.xml:/etc/clickhouse-server/config.d/custom.xml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - mxcwpp-net
    deploy:
      resources:
        limits:
          memory: 2G

  # ==================== 应用服务（Air 热重载）====================
  agentcenter:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.agentcenter.dev
    image: mxcwpp-agentcenter:dev
    container_name: mxcwpp-agentcenter-dev
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "6751:6751"
      - "6752:8080"
    volumes:
      - ../:/workspace:rw
      - /workspace/deploy/data
      - ./config/server.yaml:/etc/mxcwpp/server.yaml:ro
      - ./certs:/etc/mxcwpp/certs:ro
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    working_dir: /workspace
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      GO_ENV: development
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      sh -c "
        cd /workspace &&
        mkdir -p tmp &&
        go mod tidy &&
        if command -v air > /dev/null 2>&1 && [ -f configs/air/agentcenter.toml ]; then
          echo '使用 Air 热重载模式（AgentCenter）...';
          air -c configs/air/agentcenter.toml
        else
          echo '使用 go run 模式...';
          go run ./cmd/server/agentcenter -config /etc/mxcwpp/server.yaml
        fi
      "
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8080/health 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s
    networks:
      - mxcwpp-net

  manager:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.manager.dev
    image: mxcwpp-manager:dev
    container_name: mxcwpp-manager-dev
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ../:/workspace:rw
      - /workspace/deploy/data
      - ./config/server.yaml:/etc/mxcwpp/server.yaml:ro
      - ./certs:/etc/mxcwpp/certs:ro
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    working_dir: /workspace
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      GO_ENV: development
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      sh -c "
        cd /workspace &&
        mkdir -p tmp &&
        go mod tidy &&
        if command -v air > /dev/null 2>&1 && [ -f configs/air/manager.toml ]; then
          echo '使用 Air 热重载模式（Manager）...';
          air -c configs/air/manager.toml
        else
          echo '使用 go run 模式...';
          go run ./cmd/server/manager -config /etc/mxcwpp/server.yaml
        fi
      "
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8080/health 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 180s
    networks:
      - mxcwpp-net

  consumer:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.consumer.dev
    image: mxcwpp-consumer:dev
    container_name: mxcwpp-consumer-dev
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ../:/workspace:rw
      - /workspace/deploy/data
      - ./config/server.yaml:/etc/mxcwpp/server.yaml:ro
      - ./certs:/etc/mxcwpp/certs:ro
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    working_dir: /workspace
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      GO_ENV: development
      # v2 拆分: Consumer 仅 writer 路径, CEL 检测全部交 Engine 服务
      MXCWPP_CONSUMER_ANALYSIS: "false"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      sh -c "
        cd /workspace &&
        mkdir -p tmp &&
        go mod tidy &&
        if command -v air > /dev/null 2>&1 && [ -f configs/air/consumer.toml ]; then
          echo '使用 Air 热重载模式（Consumer）...';
          air -c configs/air/consumer.toml
        else
          echo '使用 go run 模式...';
          go run ./cmd/server/consumer -config /etc/mxcwpp/server.yaml
        fi
      "
    healthcheck:
      test: ["CMD-SHELL", "ps | grep -E 'air|/tmp/consumer|go run ./cmd/server/consumer' | grep -v grep > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 120s
    networks:
      - mxcwpp-net

  # 前端 web 不进容器：macOS 下 bind mount 走 virtiofs，dev 热更新慢。
  # 前端在本机跑（make web-dev，端口 3000，代理 /api 到 host:8080），后端留容器。

  agent:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.agent.dev
    image: mxcwpp-agent:dev
    container_name: mxcwpp-agent-dev
    restart: unless-stopped
    depends_on:
      agentcenter:
        condition: service_healthy
    volumes:
      - ../:/workspace:rw
      - /workspace/deploy/data
      - agent_data:/var/lib/mxcwpp-agent
      - agent_logs:/var/log/mxcwpp-agent
      - ./certs:/var/lib/mxcwpp-agent/certs:rw
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    working_dir: /workspace
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      GO_ENV: development
      SERVER_HOST: agentcenter:6751
    command: >
      sh -c "
        cd /workspace &&
        mkdir -p tmp &&
        go mod tidy &&
        if command -v air > /dev/null 2>&1 && [ -f configs/air/agent.toml ]; then
          echo '使用 Air 热重载模式（Agent）...';
          air -c configs/air/agent.toml
        else
          echo '使用 go run 模式...';
          go run -ldflags \"-X main.serverHost=$${SERVER_HOST:-agentcenter:6751} -X main.buildVersion=$${VERSION:-dev} -X main.buildTime=$$(date -u +'%Y-%m-%dT%H:%M:%SZ')\" ./cmd/agent
        fi
      "
    networks:
      - mxcwpp-net
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 3G

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: mxcwpp-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus-rules.yml:/etc/prometheus/rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=90d"
      - "--web.enable-lifecycle"
    networks:
      - mxcwpp-net

  # 撤销：原计划部署 mysql/redis/kafka/clickhouse exporter + alertmanager
  # 重新评估后判定全部重复造轮子：
  #   - mysql/redis/clickhouse 指标已由 driver (gorm/redis INFO/system.metrics) 真实采集
  #   - kafka 指标已由 sarama admin 真实采集
  #   - 告警路由已由 mxcwpp alerts 表 + notification 系统覆盖 (Lark/Webhook)
  # 替代：Prometheus 直 webhook 到 manager /api/v1/internal/alerts/prometheus，
  #       告警入 alerts 表 (source=prometheus_infra)，复用现有 notification 分发。

  # ==================== PDF 服务端渲染（Gotenberg） ====================
  # 提供 Chromium 服务端 PDF 生成，替代前端 jsPDF 大数据集卡死问题。
  # 通过 HTTP API: POST /forms/chromium/convert/url
  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: mxcwpp-gotenberg
    restart: unless-stopped
    command:
      - "gotenberg"
      - "--chromium-disable-web-security"
      - "--chromium-allow-list=.*"
      - "--api-port=3000"
    ports:
      - "13000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - mxcwpp-net

  # ==================== Engine (检测引擎独立服务) ====================
  engine:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.consumer.dev
    image: mxcwpp-consumer:dev
    container_name: mxcwpp-engine-dev
    restart: unless-stopped
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
      clickhouse: { condition: service_healthy }
      kafka: { condition: service_healthy }
    volumes:
      - ../:/workspace:rw
      - /workspace/deploy/data
      - ./config/server.yaml:/etc/mxcwpp/server.yaml:ro
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    working_dir: /workspace
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      GO_ENV: development
      # v2 拆分: engine 接管 CEL 检测, consumer 仅 writer 路径 (MXCWPP_CONSUMER_ANALYSIS=false)
      MXCWPP_ENGINE_DATABASE_DSN: "mxcwpp_user:123456@tcp(mysql:3306)/mxcwpp?charset=utf8mb4&parseTime=true&loc=Asia%2FShanghai"
      MXCWPP_ENGINE_KAFKA_BROKERS: "kafka:9092"
    networks: [mxcwpp-net]
    command: >
      sh -c "
        cd /workspace && mkdir -p tmp && go mod tidy &&
        echo '启动 Engine...' &&
        go run ./cmd/server/engine -config /etc/mxcwpp/server.yaml
      "

  # ==================== VulnSync (漏洞情报融合) ====================
  vulnsync:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.consumer.dev
    image: mxcwpp-consumer:dev
    container_name: mxcwpp-vulnsync-dev
    restart: unless-stopped
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }
    volumes:
      - ../:/workspace:rw
      - /workspace/deploy/data
      - ./config/server.yaml:/etc/mxcwpp/server.yaml:ro
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    working_dir: /workspace
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      GO_ENV: development
    networks: [mxcwpp-net]
    command: >
      sh -c "
        cd /workspace && mkdir -p tmp && go mod tidy &&
        echo '启动 VulnSync...' &&
        go run ./cmd/server/vulnsync -config /etc/mxcwpp/server.yaml
      "

  # ==================== LLMProxy (LLM 网关) ====================
  llmproxy:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.consumer.dev
    image: mxcwpp-consumer:dev
    container_name: mxcwpp-llmproxy-dev
    restart: unless-stopped
    depends_on:
      redis: { condition: service_healthy }
    volumes:
      - ../:/workspace:rw
      - /workspace/deploy/data
      - ./config/server.yaml:/etc/mxcwpp/server.yaml:ro
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    working_dir: /workspace
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      GO_ENV: development
    networks: [mxcwpp-net]
    command: >
      sh -c "
        cd /workspace && mkdir -p tmp && go mod tidy &&
        echo '启动 LLMProxy...' &&
        go run ./cmd/server/llmproxy -config /etc/mxcwpp/server.yaml
      "

  scanner:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.scanner
    image: mxcwpp-scanner:dev
    container_name: mxcwpp-scanner-dev
    restart: unless-stopped
    depends_on:
      mysql: { condition: service_healthy }
    volumes:
      - ./config/server.yaml:/etc/mxcwpp/server.yaml:ro
      - trivy_cache:/root/.cache/trivy
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    networks: [mxcwpp-net]
    command: ["-config", "/etc/mxcwpp/server.yaml"]

networks:
  mxcwpp-net:
    driver: bridge

volumes:
  go_mod_cache:
    driver: local
  go_build_cache:
    driver: local
  agent_data:
    driver: local
  agent_logs:
    driver: local
  prometheus_data:
    driver: local
  trivy_cache:
    driver: local
