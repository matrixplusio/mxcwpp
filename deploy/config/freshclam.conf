# MxCwpp freshclam 配置
# ClamAV 病毒库自动更新

# 数据库存放目录
DatabaseDirectory /var/lib/clamav

# 更新日志
UpdateLogFile /var/log/clamav/freshclam.log
LogVerbose false
LogSyslog false
LogTime true
LogRotate true

# 官方镜像 (中国区可替换)
DatabaseMirror database.clamav.net
# 备用镜像
DatabaseMirror db.local.clamav.net

# 每天检查更新次数 (12 = 每 2 小时一次)
Checks 12

# DNS 数据库版本验证
DNSDatabaseInfo current.cvd.clamav.net

# 连接超时 (秒)
ConnectTimeout 30
ReceiveTimeout 60

# 代理配置 (按需开启)
# HTTPProxyServer proxy.example.com
# HTTPProxyPort 8080

# 更新后发送 SIGUSR2 通知 clamd 重载数据库
NotifyClamd /etc/clamav/clamd.conf

# 下载的数据库权限
DatabaseOwner clamav

# 测试用数据库 (包含误报率较高但更全的签名)
# TestDatabases yes

# 自定义数据库 URL (可用于内网镜像)
# DatabaseCustomURL http://mirror.internal/clamav/
# PrivateMirror mirror.internal

# 附加数据库 (社区签名)
# ExtraDatabase https://ftp.swin.edu.au/sanesecurity/junk.ndb
