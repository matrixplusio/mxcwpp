global
    log stdout format raw local0
    maxconn 20000

defaults
    log global
    mode tcp
    option tcplog
    timeout connect 5s
    timeout client 2m
    timeout server 2m

resolvers docker
    nameserver dns 127.0.0.11:53
    accepted_payload_size 8192
    hold valid 5s

frontend fe_agentcenter
    bind *:6751
    default_backend be_agentcenter

backend be_agentcenter
    balance leastconn
    option tcp-check
    default-server inter 2s fall 2 rise 2 resolve-prefer ipv4 resolvers docker init-addr last,libc,none
    server-template ac 4 agentcenter:6751 check
