# MxCwpp Platform — Prometheus 告警规则（精简，仅自研服务）
#
# 设计原则：
#   - 只关心 mxcwpp 自研服务（manager / agentcenter / consumer）
#   - 不规则 mysql / redis / clickhouse / kafka — 这些由 mxcwpp monitor handler
#     的 driver-level 检查覆盖，且 mxcwpp 内置告警系统会用其他路径上报
#
# 命名规范：MxCwpp<Component><Issue>
# severity: critical (P0) / warning (P1) / info (P2)
#
# 告警流向：
#   Prometheus 触发 → webhook /api/v1/internal/alerts/prometheus
#                  → mxcwpp alerts 表 (source=prometheus_infra)
#                  → notification 系统 (Lark/Webhook)

groups:
  # ============ 服务存活 ============
  - name: mxcwpp_service_availability
    interval: 30s
    rules:
      - alert: MxCwppServiceDown
        expr: up{job=~"mxcwpp-.+"} == 0
        for: 1m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "{{ $labels.service }} 服务不可达 (job={{ $labels.job }})"
          description: |
            mxcwpp 服务 {{ $labels.service }} ({{ $labels.instance }}) 已 1 分钟无法 scrape。
            可能原因：进程崩溃、网络中断、配置错误。
            排查：docker ps / docker logs {{ $labels.instance }} / curl http://{{ $labels.instance }}/metrics

      - alert: MxCwppServiceFlapping
        expr: changes(up{job=~"mxcwpp-.+"}[10m]) > 4
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "{{ $labels.service }} 服务状态频繁变化（10 分钟内 > 4 次）"
          description: "服务在 10 分钟内状态翻转 {{ $value }} 次，可能崩溃重启循环。"

  # ============ Manager HTTP RED 指标 ============
  - name: mxcwpp_manager_http
    interval: 30s
    rules:
      - alert: MxCwppManagerHighErrorRate
        expr: |
          sum(rate(mxcwpp_http_requests_total{status_code=~"5.."}[5m]))
          / sum(rate(mxcwpp_http_requests_total[5m])) > 0.05
        for: 5m
        labels:
          severity: critical
          service: manager
        annotations:
          summary: "Manager 5xx 错误率 > 5% 持续 5 分钟"
          description: "当前: {{ $value | humanizePercentage }}。查 manager 日志。"

      - alert: MxCwppManagerHighP99Latency
        expr: |
          histogram_quantile(0.99,
            sum by (le) (rate(mxcwpp_http_request_duration_seconds_bucket[5m]))
          ) > 1.0
        for: 5m
        labels:
          severity: warning
          service: manager
        annotations:
          summary: "Manager p99 延迟 > 1s 持续 5 分钟"
          description: "当前 p99: {{ $value }}s。可能 DB 慢查询或下游卡顿。"

  # ============ AgentCenter gRPC RED 指标 ============
  - name: mxcwpp_ac_grpc
    interval: 30s
    rules:
      - alert: MxCwppACHighErrorRate
        expr: |
          sum(rate(mxcwpp_ac_grpc_handled_total{grpc_code!="OK"}[5m]))
          / sum(rate(mxcwpp_ac_grpc_handled_total[5m])) > 0.05
        for: 5m
        labels:
          severity: critical
          service: agentcenter
        annotations:
          summary: "AgentCenter gRPC 错误率 > 5%"
          description: "当前: {{ $value | humanizePercentage }}。检查 Agent 连接和认证。"

      # Transfer 是长生命周期双向流，grpc_handled_total 只在流结束才 +1，
      # 用它判流量对长连接服务恒为 0（假阳）。改用 msg_received_total（流内每条消息计数）。
      - alert: MxCwppACNoTraffic
        expr: sum(rate(mxcwpp_ac_grpc_msg_received_total[5m])) == 0
        for: 10m
        labels:
          severity: warning
          service: agentcenter
        annotations:
          summary: "AgentCenter 10 分钟无 Agent 上行消息"
          description: "可能所有 Agent 离线，或 AC 实例不健康。"

  # ============ Consumer 处理能力 ============
  - name: mxcwpp_consumer_kafka
    interval: 30s
    rules:
      - alert: MxCwppConsumerHighLag
        expr: mxcwpp_consumer_lag > 50000
        for: 5m
        labels:
          severity: warning
          service: consumer
        annotations:
          summary: "Consumer 队列积压超过 50K"
          description: "topic={{ $labels.topic }} partition={{ $labels.partition }} lag={{ $value }}"

      - alert: MxCwppConsumerHighErrorRate
        expr: |
          sum(rate(mxcwpp_consumer_records_consumed_total{status=~"error|dlq"}[5m]))
          / sum(rate(mxcwpp_consumer_records_consumed_total[5m])) > 0.05
        for: 5m
        labels:
          severity: critical
          service: consumer
        annotations:
          summary: "Consumer 错误率 > 5%"
          description: "{{ $value | humanizePercentage }} 消息处理失败或进入 DLQ。"

      - alert: MxCwppConsumerNoMembers
        expr: mxcwpp_consumer_group_members == 0
        for: 2m
        labels:
          severity: critical
          service: consumer
        annotations:
          summary: "Consumer Group 无活跃成员"
          description: "所有 consumer 实例已断开，Kafka 消息将停滞。"

  # ============ Go 运行时饱和度（自动覆盖所有 mxcwpp-* 服务）============
  - name: mxcwpp_saturation
    interval: 60s
    rules:
      - alert: MxCwppHighCPU
        expr: 100 * rate(process_cpu_seconds_total{job=~"mxcwpp-.+"}[5m]) > 80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.service }} CPU 持续 > 80% (10min)"
          description: "当前: {{ $value | humanize }}%"

      - alert: MxCwppHighMemory
        expr: process_resident_memory_bytes{job=~"mxcwpp-.+"} > 2147483648  # 2GB
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.service }} RSS > 2GB (10min)"
          description: "当前: {{ $value | humanize1024 }}B"

      - alert: MxCwppGoroutineLeak
        expr: go_goroutines{job=~"mxcwpp-.+"} > 10000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.service }} goroutine 数 > 10000，疑似泄漏"
          description: "当前: {{ $value }}"

      - alert: MxCwppGCPauseLong
        expr: |
          histogram_quantile(0.99, sum by (job, le)
            (rate(go_gc_duration_seconds_bucket{job=~"mxcwpp-.+"}[5m]))) > 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.service }} GC p99 暂停 > 500ms"
          description: "当前: {{ $value }}s"

  # ============ Manager → MySQL 视角（gorm callback 埋点）============
  # 注：mxcwpp_db_query_duration_seconds 由 Manager 端 gorm callback 提供（Tier 1-2 新增）
  - name: mxcwpp_db
    interval: 60s
    rules:
      - alert: MxCwppDBSlowQuery
        expr: |
          histogram_quantile(0.99,
            sum by (le, operation, table) (rate(mxcwpp_db_query_duration_seconds_bucket[5m]))
          ) > 1.0
        for: 5m
        labels:
          severity: warning
          service: manager
        annotations:
          summary: "Manager DB 查询 p99 > 1s ({{ $labels.operation }} on {{ $labels.table }})"
          description: "当前: {{ $value }}s"

  # ============ Manager → ClickHouse 视角（edr_events.go recordCHQuery 埋点）============
  # 商业级 EDR 查询基线：列表 < 200ms，统计 < 1s。
  # 慢于此说明 projection 未命中 / 数据量异常 / CH 资源紧张。
  - name: mxcwpp_clickhouse
    interval: 60s
    rules:
      - alert: MxCwppCHQuerySlow
        expr: |
          histogram_quantile(0.99,
            sum by (le, operation, table) (rate(mxcwpp_clickhouse_query_duration_seconds_bucket[5m]))
          ) > 3.0
        for: 5m
        labels:
          severity: warning
          service: manager
        annotations:
          summary: "ClickHouse 查询 p99 > 3s ({{ $labels.operation }} on {{ $labels.table }})"
          description: |
            当前 p99: {{ $value }}s
            排查：
            1. SELECT * FROM system.parts WHERE table='{{ $labels.table }}' AND active 查 part 数
            2. SELECT * FROM system.mutations WHERE table='{{ $labels.table }}' AND not is_done
            3. EXPLAIN PIPELINE SELECT ... 看是否走 projection

      - alert: MxCwppCHQueryTimeout
        expr: |
          sum by (operation, table) (
            rate(mxcwpp_clickhouse_query_duration_seconds_count{status="timeout"}[5m])
          ) > 0
        for: 2m
        labels:
          severity: critical
          service: manager
        annotations:
          summary: "ClickHouse 查询超时 ({{ $labels.operation }} on {{ $labels.table }})"
          description: |
            5 分钟内出现超时（max_execution_time 50s 或 ctx 60s 触发）。
            通常意味着 projection 未命中或数据量暴增。
            立即检查 system.parts merge backlog + materialize projection 进度。

      - alert: MxCwppCHQueryError
        expr: |
          sum by (operation, table) (
            rate(mxcwpp_clickhouse_query_duration_seconds_count{status="error"}[5m])
          ) > 0.01
        for: 5m
        labels:
          severity: warning
          service: manager
        annotations:
          summary: "ClickHouse 查询错误率高 ({{ $labels.operation }} on {{ $labels.table }})"
          description: "当前错误率: {{ $value }} qps（持续 5 分钟）"

  # Kafka 生产者 burst 丢弃（agent 重连风暴/扫描叠加遥测尖峰下，Input+fallback 满即静默丢，
  # 含 EDR eBPF 遥测与任务结果）。稳态应为 0，任何持续 drop 都意味着遥测/检测数据丢失。
  - name: mxcwpp_kafka_producer
    rules:
      - alert: MxCwppKafkaProducerDrops
        expr: |
          sum by (instance, reason) (
            rate(mxcwpp_kafka_producer_dropped_total[5m])
          ) > 0
        for: 1m
        labels:
          severity: warning
          service: agentcenter
        annotations:
          summary: "Kafka 生产者丢弃消息 ({{ $labels.reason }} on {{ $labels.instance }})"
          description: |
            burst 下 Input/降级队列满，消息被静默丢弃（含 EDR eBPF 事件 → 检测盲区）。
            当前丢弃率: {{ $value }} msg/s。
            排查：是否 agent 重连风暴/扫描叠加；考虑调大 producer channel_buffer_size / fallback_queue_size，
            或 agent 侧 eBPF 采样限流。

      - alert: MxCwppKafkaProducerFallbackHigh
        expr: mxcwpp_kafka_producer_fallback_len > 5000
        for: 1m
        labels:
          severity: warning
          service: agentcenter
        annotations:
          summary: "Kafka 生产者降级队列积压 ({{ $labels.instance }})"
          description: "降级队列长度 {{ $value }}，接近溢出阈值，生产者排空速率跟不上到达速率。"
