name: mxcwpp-v2

# v2.0 完整 6 微服务架构 docker-compose (P3-17)
#
# 服务清单:
#   基础设施: mysql + redis + kafka (KRaft) + clickhouse + prometheus + grafana
#   mxcwpp:    manager + agentcenter + consumer + engine + vulnsync + llmproxy + ui
#
# 启动: docker compose -f deploy/docker-compose.v2.yml up -d
#
# 环境变量从 .env 读 (复制 deploy/env.example → .env 修改).

services:
  # ==================== 基础设施 ====================

  mysql:
    image: mysql:8.0
    container_name: mxcwpp-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: mxcwpp
      MYSQL_USER: mxcwpp
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [mxcwpp]

  redis:
    image: redis:7.2-alpine
    container_name: mxcwpp-redis
    restart: always
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
    networks: [mxcwpp]

  kafka:
    image: bitnami/kafka:3.7
    container_name: mxcwpp-kafka
    restart: always
    environment:
      KAFKA_ENABLE_KRAFT: "yes"
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka-data:/bitnami/kafka
    networks: [mxcwpp]

  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: mxcwpp-clickhouse
    restart: always
    environment:
      CLICKHOUSE_DB: mxcwpp
      CLICKHOUSE_USER: mxcwpp
      CLICKHOUSE_PASSWORD: ${CH_PASSWORD}
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks: [mxcwpp]

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: mxcwpp-prometheus
    restart: always
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-remote-write-receiver'
    networks: [mxcwpp]

  grafana:
    image: grafana/grafana:10.4.2
    container_name: mxcwpp-grafana
    restart: always
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    networks: [mxcwpp]

  # ==================== 6 微服务 ====================

  manager:
    image: ${REGISTRY:-mxcwpp}/manager:${VERSION:-2.0.0}
    container_name: mxcwpp-manager
    restart: always
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      MXCWPP_MANAGER_JWT_SECRET: ${JWT_SECRET}
      MXCWPP_MANAGER_DATABASE_DSN: mxcwpp:${MYSQL_PASSWORD}@tcp(mysql:3306)/mxcwpp?parseTime=true
      MXCWPP_MANAGER_REDIS_ADDR: redis:6379
      MXCWPP_MANAGER_REDIS_PASSWORD: ${REDIS_PASSWORD}
      MXCWPP_MANAGER_CLICKHOUSE_ADDR: clickhouse:9000
      MXCWPP_MANAGER_KAFKA_BROKERS: kafka:9092
      MXCWPP_KMS_KEK_V1: ${KMS_KEK_V1}
    ports:
      - "127.0.0.1:8080:8080"
    networks: [mxcwpp]

  agentcenter:
    image: ${REGISTRY:-mxcwpp}/agentcenter:${VERSION:-2.0.0}
    container_name: mxcwpp-agentcenter
    restart: always
    depends_on: [manager, redis, kafka]
    environment:
      MXCWPP_AC_MANAGER_ENDPOINT: http://manager:8080
      MXCWPP_AC_DATABASE_DSN: mxcwpp:${MYSQL_PASSWORD}@tcp(mysql:3306)/mxcwpp?parseTime=true
      MXCWPP_AC_REDIS_ADDR: redis:6379
      MXCWPP_AC_REDIS_PASSWORD: ${REDIS_PASSWORD}
      MXCWPP_AC_KAFKA_BROKERS: kafka:9092
      MXCWPP_AC_INTERNAL_SECRET: ${INTERNAL_SECRET}
    ports:
      - "6751:6751"   # gRPC for Agents (公网暴露)
      - "127.0.0.1:6752:6752"
    networks: [mxcwpp]

  consumer:
    image: ${REGISTRY:-mxcwpp}/consumer:${VERSION:-2.0.0}
    container_name: mxcwpp-consumer
    restart: always
    depends_on: [kafka, clickhouse, mysql]
    environment:
      MXCWPP_CONSUMER_KAFKA_BROKERS: kafka:9092
      MXCWPP_CONSUMER_DATABASE_DSN: mxcwpp:${MYSQL_PASSWORD}@tcp(mysql:3306)/mxcwpp?parseTime=true
      MXCWPP_CONSUMER_CLICKHOUSE_ADDR: clickhouse:9000
      MXCWPP_CONSUMER_ANALYSIS_ENABLED: "false"
    networks: [mxcwpp]

  engine:
    image: ${REGISTRY:-mxcwpp}/engine:${VERSION:-2.0.0}
    container_name: mxcwpp-engine
    restart: always
    depends_on: [kafka, mysql]
    environment:
      MXCWPP_ENGINE_KAFKA_BROKERS: kafka:9092
      MXCWPP_ENGINE_DATABASE_DSN: mxcwpp:${MYSQL_PASSWORD}@tcp(mysql:3306)/mxcwpp?parseTime=true
      MXCWPP_ENGINE_ALERT_TOPIC: mxcwpp.engine.alert
      MXCWPP_ENGINE_DEFAULT_MODE: observe
    networks: [mxcwpp]

  vulnsync:
    image: ${REGISTRY:-mxcwpp}/vulnsync:${VERSION:-2.0.0}
    container_name: mxcwpp-vulnsync
    restart: always
    depends_on: [mysql, kafka]
    environment:
      MXCWPP_VULNSYNC_DATABASE_DSN: mxcwpp:${MYSQL_PASSWORD}@tcp(mysql:3306)/mxcwpp?parseTime=true
      MXCWPP_VULNSYNC_KAFKA_BROKERS: kafka:9092
      MXCWPP_VULNSYNC_NVD_API_KEY: ${NVD_API_KEY:-}
    networks: [mxcwpp]

  llmproxy:
    image: ${REGISTRY:-mxcwpp}/llmproxy:${VERSION:-2.0.0}
    container_name: mxcwpp-llmproxy
    restart: always
    depends_on: [redis]
    environment:
      MXCWPP_LLMPROXY_REDIS_ADDR: redis:6379
      MXCWPP_LLMPROXY_REDIS_PASSWORD: ${REDIS_PASSWORD}
      MXCWPP_LLMPROXY_PROVIDERS_OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MXCWPP_LLMPROXY_PROVIDERS_ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    networks: [mxcwpp]

  ui:
    image: ${REGISTRY:-mxcwpp}/ui:${VERSION:-2.0.0}
    container_name: mxcwpp-ui
    restart: always
    depends_on: [manager]
    environment:
      MANAGER_URL: http://manager:8080
    ports:
      - "80:80"
    networks: [mxcwpp]

volumes:
  mysql-data:
  redis-data:
  kafka-data:
  clickhouse-data:
  prometheus-data:
  grafana-data:

networks:
  mxcwpp:
    name: mxcwpp
    driver: bridge
