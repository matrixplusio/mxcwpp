# mxsec-server Helm chart values
#
# 6 微服务的 image / replicas / env / resources 配置。
# 部署: helm install mxsec ./deploy/kubernetes/helm/mxsec-server -f my-values.yaml

global:
  imageRegistry: ghcr.io/imkerbos
  imagePullPolicy: IfNotPresent
  imageTag: "2.0.0"
  storageClass: ""
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65534
    fsGroup: 65534

# 共享配置: 注入 KMS KEK (强制要求, 部署前从 secret 取)
kms:
  enabled: true
  existingSecret: "mxsec-kms"           # k get secret mxsec-kms
  secretKey: "MXSEC_KMS_KEK_V1"

# 外部基础设施 (用户自带)
externalServices:
  mysql:
    host: mysql.default.svc.cluster.local
    port: 3306
    database: mxsec
    existingSecret: "mxsec-mysql"
    userKey: "username"
    passwordKey: "password"
  redis:
    host: redis.default.svc.cluster.local
    port: 6379
    existingSecret: "mxsec-redis"
    passwordKey: "password"
  kafka:
    brokers: "kafka.default.svc.cluster.local:9092"
  clickhouse:
    host: clickhouse.default.svc.cluster.local
    port: 9000
    database: mxsec
    existingSecret: "mxsec-clickhouse"

# ===================== 6 微服务 =====================

manager:
  enabled: true
  replicaCount: 2
  image:
    repository: mxsec-manager
    tag: ""  # 默认走 global.imageTag
  service:
    type: ClusterIP
    port: 8080
  resources:
    limits:
      cpu: 2000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 512Mi
  env: []  # 额外环境变量
  ingress:
    enabled: false
    className: nginx
    host: mxsec.example.com
    tls:
      enabled: true
      secretName: mxsec-tls

agentcenter:
  enabled: true
  replicaCount: 3
  image:
    repository: mxsec-agentcenter
  service:
    type: ClusterIP
    grpcPort: 6751
    httpPort: 6752
  resources:
    limits:
      cpu: 2000m
      memory: 4Gi
    requests:
      cpu: 1000m
      memory: 1Gi
  # 给 Agent 用的 LoadBalancer 入口 (NodePort 或 LB)
  agentService:
    type: NodePort
    nodePort: 30751

consumer:
  enabled: true
  replicaCount: 3
  image:
    repository: mxsec-consumer
  resources:
    limits:
      cpu: 2000m
      memory: 4Gi
    requests:
      cpu: 1000m
      memory: 1Gi
  config:
    analysisEnabled: false   # 走 Engine 微服务

engine:
  enabled: true
  replicaCount: 2
  image:
    repository: mxsec-engine
  service:
    type: ClusterIP
    port: 8082
  resources:
    limits:
      cpu: 4000m
      memory: 8Gi
    requests:
      cpu: 2000m
      memory: 2Gi
  config:
    defaultMode: observe       # observe / protect (后者需 6 闸门)
    alertTopic: mxsec.engine.alert
    enabledStages: []          # 空 → 自动按 DB 可用情况启用

vulnsync:
  enabled: true
  replicaCount: 1
  image:
    repository: mxsec-vulnsync
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 200m
      memory: 256Mi
  config:
    sources:
      - nvd
      - osv
      - cisa-kev
      - epss
      - redhat
      - ubuntu
      - debian
      - alpine
      - suse
      - openeuler
      - anolis
      - kylin
      - uos
      - cnnvd
      - edb

llmproxy:
  enabled: true
  replicaCount: 1
  image:
    repository: mxsec-llmproxy
  service:
    type: ClusterIP
    port: 8085
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  config:
    providers:
      openai:
        enabled: true
        existingSecret: "mxsec-llm-keys"
        keyName: "openai-api-key"
      anthropic:
        enabled: true
        existingSecret: "mxsec-llm-keys"
        keyName: "anthropic-api-key"
      gemini:
        enabled: false

# ===================== UI =====================

ui:
  enabled: true
  replicaCount: 2
  image:
    repository: mxsec-ui
  service:
    type: ClusterIP
    port: 80
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi

# ===================== 可观测性 =====================

observability:
  metricsServiceMonitor:
    enabled: false             # 安装了 prometheus-operator 才打开
    interval: 30s
  podMonitor:
    enabled: false
  otel:
    enabled: false
    endpoint: jaeger.default.svc.cluster.local:4318
    sampleRate: 0.1

# ===================== K8s 镜像扫描 CronJob =====================

imageScan:
  enabled: false
  schedule: "0 2 * * *"
  image: aquasec/trivy:0.50.0
  nodeSelector: {}
  tolerations: []
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
