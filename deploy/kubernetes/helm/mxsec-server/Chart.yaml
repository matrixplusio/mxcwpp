apiVersion: v2
name: mxsec-server
description: |
  mxsec 服务端 Helm Chart — 6 微服务 + 基础设施.

  覆盖:
    - manager       (HTTP/gRPC API 网关 + 业务协调)
    - agentcenter   (Agent 注册 + gRPC + 命令分发)
    - consumer      (Kafka 多源数据管道)
    - engine        (检测分析引擎, 13 Stages)
    - vulnsync      (15 漏洞源融合)
    - llmproxy      (多 LLM 网关)

  基础设施依赖 (subchart dependencies):
    - mysql / redis / kafka / clickhouse / prometheus

  必备 envelope encryption KEK 注入:
    secret/mxsec-kms.yaml 包含 MXSEC_KMS_KEK_V1
type: application
version: 0.1.0
appVersion: "2.0.0"
maintainers:
  - name: mxsec
    email: dev@mxsec.local
keywords:
  - security
  - hids
  - edr
  - cwpp
  - linux
  - kubernetes
dependencies: []  # 简化版: 用户自带 mysql/redis/kafka, 后续 PR 接 bitnami subchart
