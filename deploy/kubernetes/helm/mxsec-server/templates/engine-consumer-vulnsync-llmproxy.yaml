{{/*
Engine / Consumer / VulnSync / LLMProxy 4 个无 HTTP 入口或仅 metrics 的服务.
模板化重复, 通过 range 生成。
*/}}
{{- range $name, $cfg := dict "engine" .Values.engine "consumer" .Values.consumer "vulnsync" .Values.vulnsync "llmproxy" .Values.llmproxy }}
{{- if $cfg.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mxsec.serviceName" (dict "Release" $.Release "component" $name) }}
  labels:
    {{- include "mxsec.serviceLabels" (dict "root" $ "name" $name) | nindent 4 }}
spec:
  replicas: {{ $cfg.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $.Release.Name }}
      app.kubernetes.io/component: {{ $name }}
  template:
    metadata:
      labels:
        {{- include "mxsec.serviceLabels" (dict "root" $ "name" $name) | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml $.Values.global.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ $name }}
          image: {{ include "mxsec.image" (dict "svc" $cfg "global" $.Values.global) }}
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          env:
            {{- include "mxsec.kmsEnv" $ | nindent 12 }}
            {{- include "mxsec.dbEnv" $ | nindent 12 }}
            {{- if eq $name "engine" }}
            - name: MXSEC_ENGINE_DEFAULT_MODE
              value: {{ $cfg.config.defaultMode | quote }}
            - name: MXSEC_ENGINE_ALERT_TOPIC
              value: {{ $cfg.config.alertTopic | quote }}
            {{- end }}
            {{- if eq $name "consumer" }}
            - name: MXSEC_CONSUMER_ANALYSIS
              value: {{ $cfg.config.analysisEnabled | quote }}
            {{- end }}
          resources:
            {{- toYaml $cfg.resources | nindent 12 }}
{{- if or (eq $name "engine") (eq $name "llmproxy") }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mxsec.serviceName" (dict "Release" $.Release "component" $name) }}
spec:
  type: {{ $cfg.service.type }}
  ports:
    - port: {{ $cfg.service.port }}
      targetPort: {{ $cfg.service.port }}
      name: http
  selector:
    app.kubernetes.io/name: {{ $.Release.Name }}
    app.kubernetes.io/component: {{ $name }}
{{- end }}
{{- end }}
{{- end }}
