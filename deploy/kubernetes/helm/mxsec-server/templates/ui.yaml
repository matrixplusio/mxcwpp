{{- if .Values.ui.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mxsec.serviceName" (dict "Release" .Release "component" "ui") }}
  labels:
    {{- include "mxsec.serviceLabels" (dict "root" . "name" "ui") | nindent 4 }}
spec:
  replicas: {{ .Values.ui.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Release.Name }}
      app.kubernetes.io/component: ui
  template:
    metadata:
      labels:
        {{- include "mxsec.serviceLabels" (dict "root" . "name" "ui") | nindent 8 }}
    spec:
      containers:
        - name: ui
          image: {{ include "mxsec.image" (dict "svc" .Values.ui "global" .Values.global) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 80
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mxsec.serviceName" (dict "Release" .Release "component" "ui") }}
spec:
  type: {{ .Values.ui.service.type }}
  ports:
    - port: {{ .Values.ui.service.port }}
      targetPort: http
      name: http
  selector:
    app.kubernetes.io/name: {{ .Release.Name }}
    app.kubernetes.io/component: ui
{{- end }}
