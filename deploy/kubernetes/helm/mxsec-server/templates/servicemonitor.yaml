{{/*
ServiceMonitor for prometheus-operator scraping.
仅当 observability.metricsServiceMonitor.enabled=true 时启用.
}}*/}}
{{- if .Values.observability.metricsServiceMonitor.enabled }}
{{- range $name, $cfg := dict "manager" .Values.manager "agentcenter" .Values.agentcenter "engine" .Values.engine "llmproxy" .Values.llmproxy "vulnsync" .Values.vulnsync }}
{{- if $cfg.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "mxsec.serviceName" (dict "Release" $.Release "component" $name) }}
  labels:
    {{- include "mxsec.serviceLabels" (dict "root" $ "name" $name) | nindent 4 }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $.Release.Name }}
      app.kubernetes.io/component: {{ $name }}
  endpoints:
    - port: http
      path: /metrics
      interval: {{ $.Values.observability.metricsServiceMonitor.interval | default "30s" }}
      scrapeTimeout: {{ $.Values.observability.metricsServiceMonitor.scrapeTimeout | default "10s" }}
      relabelings:
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: kubernetes_namespace
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: kubernetes_pod_name
{{- end }}
{{- end }}
{{- end }}
