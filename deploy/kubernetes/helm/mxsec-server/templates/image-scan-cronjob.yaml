{{/*
K8s 镜像扫描 CronJob (P4-8).

每日定时拉取 cluster 内所有运行中 Pod 的镜像列表, 调 trivy/grype 扫描漏洞,
上报到 vulnsync 服务.

仅当 imageScan.enabled=true 时启用. 默认每天 02:00 UTC.
*/}}
{{- if .Values.imageScan.enabled }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "mxsec.serviceName" (dict "Release" .Release "component" "image-scan") }}
  labels:
    {{- include "mxsec.serviceLabels" (dict "root" . "name" "image-scan") | nindent 4 }}
spec:
  schedule: {{ .Values.imageScan.schedule | default "0 2 * * *" | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            {{- include "mxsec.serviceLabels" (dict "root" . "name" "image-scan") | nindent 12 }}
        spec:
          restartPolicy: OnFailure
          serviceAccountName: {{ include "mxsec.serviceName" (dict "Release" .Release "component" "image-scan") }}
          {{- with .Values.imageScan.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.imageScan.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          containers:
            - name: image-scan
              image: {{ .Values.imageScan.image | default "aquasec/trivy:latest" | quote }}
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  echo "[$(date)] image-scan job start"
                  # 1. 通过 downward + serviceaccount 调 kube-apiserver 拉 Pod 镜像
                  TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
                  CA=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                  API=https://kubernetes.default.svc
                  IMAGES=$(wget -qO- --header "Authorization: Bearer $TOKEN" --ca-certificate=$CA \
                    "$API/api/v1/pods" | \
                    grep -oE '"image":"[^"]+"' | cut -d'"' -f4 | sort -u)
                  for IMG in $IMAGES; do
                    echo "[scan] $IMG"
                    trivy image --quiet --format json --output /tmp/result.json "$IMG" || true
                    # 上报到 vulnsync
                    wget -qO- --post-file=/tmp/result.json --header "Content-Type: application/json" \
                      "http://{{ include "mxsec.serviceName" (dict "Release" .Release "component" "vulnsync") }}:8087/internal/image-scan/report?image=$IMG" || true
                  done
                  echo "[$(date)] image-scan job done"
              resources:
                requests:
                  cpu: {{ .Values.imageScan.resources.requests.cpu | default "200m" | quote }}
                  memory: {{ .Values.imageScan.resources.requests.memory | default "512Mi" | quote }}
                limits:
                  cpu: {{ .Values.imageScan.resources.limits.cpu | default "1000m" | quote }}
                  memory: {{ .Values.imageScan.resources.limits.memory | default "1Gi" | quote }}
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                capabilities:
                  drop: ["ALL"]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "mxsec.serviceName" (dict "Release" .Release "component" "image-scan") }}
  labels:
    {{- include "mxsec.serviceLabels" (dict "root" . "name" "image-scan") | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "mxsec.serviceName" (dict "Release" .Release "component" "image-scan") }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "mxsec.serviceName" (dict "Release" .Release "component" "image-scan") }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "mxsec.serviceName" (dict "Release" .Release "component" "image-scan") }}
subjects:
  - kind: ServiceAccount
    name: {{ include "mxsec.serviceName" (dict "Release" .Release "component" "image-scan") }}
    namespace: {{ .Release.Namespace }}
{{- end }}
