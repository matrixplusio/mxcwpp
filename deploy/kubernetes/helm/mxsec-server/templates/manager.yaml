{{- if .Values.manager.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mxsec.serviceName" (dict "Release" .Release "component" "manager") }}
  labels:
    {{- include "mxsec.serviceLabels" (dict "root" . "name" "manager") | nindent 4 }}
spec:
  replicas: {{ .Values.manager.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Release.Name }}
      app.kubernetes.io/component: manager
  template:
    metadata:
      labels:
        {{- include "mxsec.serviceLabels" (dict "root" . "name" "manager") | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.global.podSecurityContext | nindent 8 }}
      containers:
        - name: manager
          image: {{ include "mxsec.image" (dict "svc" .Values.manager "global" .Values.global) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            {{- include "mxsec.kmsEnv" . | nindent 12 }}
            {{- include "mxsec.dbEnv" . | nindent 12 }}
            {{- with .Values.manager.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.manager.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mxsec.serviceName" (dict "Release" .Release "component" "manager") }}
  labels:
    {{- include "mxsec.serviceLabels" (dict "root" . "name" "manager") | nindent 4 }}
spec:
  type: {{ .Values.manager.service.type }}
  ports:
    - port: {{ .Values.manager.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ .Release.Name }}
    app.kubernetes.io/component: manager
{{- if .Values.manager.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "mxsec.serviceName" (dict "Release" .Release "component" "manager") }}
spec:
  ingressClassName: {{ .Values.manager.ingress.className }}
  {{- if .Values.manager.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.manager.ingress.host }}
      secretName: {{ .Values.manager.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.manager.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "mxsec.serviceName" (dict "Release" .Release "component" "manager") }}
                port:
                  number: {{ .Values.manager.service.port }}
{{- end }}
{{- end }}
