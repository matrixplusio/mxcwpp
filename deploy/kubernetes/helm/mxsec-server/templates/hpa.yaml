{{/*
HorizontalPodAutoscaler (HPA) for 4 服务: manager / agentcenter / consumer / engine.
其余 (vulnsync / llmproxy / ui) 流量低固定副本不上 HPA.
}}*/}}
{{- range $name, $cfg := dict "manager" .Values.manager "agentcenter" .Values.agentcenter "consumer" .Values.consumer "engine" .Values.engine }}
{{- if and $cfg.enabled $cfg.autoscaling }}
{{- if $cfg.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "mxsec.serviceName" (dict "Release" $.Release "component" $name) }}
  labels:
    {{- include "mxsec.serviceLabels" (dict "root" $ "name" $name) | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "mxsec.serviceName" (dict "Release" $.Release "component" $name) }}
  minReplicas: {{ $cfg.autoscaling.minReplicas | default $cfg.replicaCount }}
  maxReplicas: {{ $cfg.autoscaling.maxReplicas | default 10 }}
  metrics:
    {{- if $cfg.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $cfg.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if $cfg.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ $cfg.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 4
          periodSeconds: 60
      selectPolicy: Max
{{- end }}
{{- end }}
{{- end }}
