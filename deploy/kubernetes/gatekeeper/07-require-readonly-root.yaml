apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: mxsecrequirereadonlyroot
spec:
  crd:
    spec:
      names:
        kind: MxsecRequireReadOnlyRoot
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package mxsec.requirereadonlyroot

        violation[{"msg": msg}] {
          c := input.review.object.spec.containers[_]
          not c.securityContext.readOnlyRootFilesystem == true
          msg := sprintf("container %v: readOnlyRootFilesystem=true required", [c.name])
        }
