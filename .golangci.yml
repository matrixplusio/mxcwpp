# golangci-lint 配置 (v2.0 代码质量基线 — v1 兼容)
# 详见 docs/code-style.md / docs/contributing.md

run:
  timeout: 5m

issues:
  exclude-dirs:
    - deploy/data
    - deploy/data-perf
    - dist
    - tmp
  exclude-rules:
    # cmd/ 下所有 main 入口允许 fmt.Print* (CLI 启动信息/进度提示是合理的用户面向 stdout)
    - path: ^cmd/
      linters: [forbidigo]
    # 部署 CLI 命令的进度输出
    - path: ^internal/deploy/cluster/
      linters: [forbidigo]
    # Agent 自更新 CLI 输出 (mxcwpp-agent --update)
    - path: ^internal/agent/updater/
      linters: [forbidigo]
    # 测试允许更宽松
    - path: _test\.go$
      linters: [errcheck, forbidigo]

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - forbidigo

linters-settings:
  forbidigo:
    forbid:
      # 强制使用 zap 日志,禁止 fmt.Println / log.Println / log.Printf
      # 例外列表见 issues.exclude-rules
      - '^fmt\.Print(ln|f)?$'
      - '^log\.(Print|Println|Printf)$'
    exclude_godoc_examples: true
